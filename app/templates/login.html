{% extends "base.html" %}
{% block title %}Login — TaskFlow{% endblock %}
{% block body %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">TaskFlow</span>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to manage your tasks</p>

    <div id="auth-error" class="alert alert-error" style="display:none"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn btn-primary btn-full" id="login-btn">Sign in</button>
    <p class="auth-switch">Don't have an account? <a href="/auth/register">Create one</a></p>
  </div>
</div>
<script>
  async function doLogin(){
    const btn=document.getElementById('login-btn');
    const err=document.getElementById('auth-error');
    btn.disabled=true; btn.textContent='Signing in…'; err.style.display='none';
    const res=await fetch('/auth/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const data=await res.json();
    if(res.ok){window.location.href='/';}
    else{err.textContent=data.error||'Login failed';err.style.display='block';btn.disabled=false;btn.textContent='Sign in';}
  }
  document.getElementById('login-btn').addEventListener('click',doLogin);
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
{% endblock %}
